<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Discover — Nocturne</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: '#11131c',
            'surface-dim': '#11131c',
            'surface-bright': '#373943',
            'surface-container-lowest': '#0c0e17',
            'surface-container-low': '#191b25',
            'surface-container': '#1d1f29',
            'surface-container-high': '#282934',
            'surface-container-highest': '#32343f',
            'on-surface': '#e1e1ef',
            'on-surface-variant': '#c8c5ce',
            outline: '#918f98',
            'outline-variant': '#47464e',
            primary: '#c3c3ec',
            'on-primary': '#2c2d4e',
            'primary-container': '#1a1b3b',
            secondary: '#c9beff',
            'on-secondary-container': '#bbaeff',
            tertiary: '#ffb780',
            background: '#11131c',
            'on-background': '#e1e1ef',
          },
          fontFamily: {
            'headline': ['Newsreader', 'serif'],
            'body': ['Plus Jakarta Sans', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background: radial-gradient(circle at 50% -20%, #1a1b3b 0%, #11131c 70%);
      -webkit-font-smoothing: antialiased;
    }
    .glass-card {
      background: rgba(25, 27, 37, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(195, 195, 236, 0.05);
    }
  </style>
</head>
<body class="font-body text-on-surface min-h-screen">
  <!-- Header -->
  <header class="flex items-center justify-between px-6 md:px-20 py-8 border-b border-outline-variant/10">
    <div class="flex items-center gap-3">
      <div class="w-6 h-6 text-primary">
        <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M36.7273 44C33.9891 44 31.6043 39.8386 30.3636 33.69C29.123 39.8386 26.7382 44 24 44C21.2618 44 18.877 39.8386 17.6364 33.69C16.3957 39.8386 14.0109 44 11.2727 44C7.25611 44 4 35.0457 4 24C4 12.9543 7.25611 4 11.2727 4C14.0109 4 16.3957 8.16144 17.6364 14.31C18.877 8.16144 21.2618 4 24 4C26.7382 4 29.123 8.16144 30.3636 14.31C31.6043 8.16144 33.9891 4 36.7273 4C40.7439 4 44 12.9543 44 24C44 35.0457 40.7439 44 36.7273 44Z" fill="currentColor"/>
        </svg>
      </div>
      <h2 class="font-headline text-xl tracking-tight">Nocturne</h2>
    </div>
    <div class="flex items-center gap-6">
      <button class="text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined">auto_awesome</span>
      </button>
      <button class="p-2 rounded-full bg-surface-container-high hover:bg-surface-bright transition-all">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-20 flex flex-col gap-20">
    <!-- Hero -->
    <section class="text-center">
      <h1 class="font-headline text-5xl md:text-6xl leading-tight italic px-6 mb-6">All Echoes</h1>
      <p class="text-lg text-on-surface-variant max-w-lg mx-auto opacity-80">
        Every whisper that drifted into the night.
      </p>
    </section>

    <!-- All Thoughts -->
    <section class="flex flex-col gap-12">
      <div id="allThoughts" class="flex flex-col gap-12">
        <!-- Thoughts will be loaded here -->
      </div>
    </section>

    <footer class="py-20 text-center">
      <p class="text-xs text-outline tracking-widest opacity-50 italic">The night hears everything.</p>
    </footer>
  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-card rounded-full px-8 py-3 flex items-center gap-10 shadow-2xl">
    <a href="index.html" class="text-on-surface-variant hover:text-on-surface transition-colors flex flex-col items-center gap-1">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] uppercase font-semibold tracking-tight">Home</span>
    </a>
    <a href="discover.html" class="text-primary flex flex-col items-center gap-1">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">explore</span>
      <span class="text-[10px] uppercase font-semibold tracking-tight">Discover</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    loadAllThoughts();
  </script>
</body>
</html>
